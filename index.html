<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>老脆的人生roadmap</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+TC:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#14121A;
    --text:#F2EEF3;
    --text-soft:#C3BCC9;
    --text-mute:#8B8390;
    --ext:#C99BD9;
    --ext-glow:#9B6BC4;
    --int:#8FC4D9;
    --int-glow:#5B9FBF;
    --amber:#E8B96A;
    --line:rgba(255,255,255,0.14);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:'Noto Sans TC',sans-serif;
    line-height:1.7;
    overflow-x:hidden;
    padding-bottom:6rem;
  }

  .bg-blob{
    position:fixed;
    border-radius:50%;
    filter:blur(90px);
    opacity:0.35;
    z-index:0;
    pointer-events:none;
  }
  .b1{width:600px;height:600px;background:var(--ext-glow);top:-10%;left:-10%}
  .b2{width:500px;height:500px;background:var(--int-glow);top:35%;right:-15%}
  .b3{width:450px;height:450px;background:var(--amber);bottom:-10%;left:20%;opacity:0.2}

  header{
    position:relative;
    z-index:1;
    max-width:960px;
    margin:0 auto;
    padding:5rem 24px 3rem;
  }
  .eyebrow{
    font-family:'JetBrains Mono',monospace;
    font-size:12px;
    letter-spacing:0.14em;
    color:var(--amber);
    text-transform:uppercase;
    margin-bottom:1rem;
  }
  h1{
    font-family:'Noto Serif TC',serif;
    font-weight:700;
    font-size:clamp(30px,5vw,46px);
    background:linear-gradient(120deg,#F2EEF3 20%,var(--ext) 60%,var(--int) 100%);
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
  }
  .sub{
    margin-top:1.2rem;
    color:var(--text-soft);
    font-size:15px;
    max-width:56ch;
  }
  .legend{
    display:flex;
    gap:24px;
    margin-top:2rem;
    font-size:13px;
    color:var(--text-mute);
  }
  .legend span{display:inline-flex;align-items:center;gap:8px}
  .dot{width:10px;height:10px;border-radius:50%;display:inline-block}
  .dot.ext{background:var(--ext);box-shadow:0 0 12px var(--ext-glow)}
  .dot.int{background:var(--int);box-shadow:0 0 12px var(--int-glow)}

  .timeline{
    position:relative;
    z-index:1;
    max-width:960px;
    margin:0 auto;
    padding:0 24px;
  }
  .spine{
    position:absolute;
    left:50%;
    top:0;
    bottom:0;
    width:1px;
    background:linear-gradient(180deg, transparent, var(--line) 6%, var(--line) 94%, transparent);
    transform:translateX(-50%);
  }

  .node{
    position:relative;
    display:grid;
    grid-template-columns:1fr 120px 1fr;
    align-items:start;
    margin-bottom:3.5rem;
    opacity:0;
    transform:translateY(24px);
    transition:opacity 0.7s ease, transform 0.7s ease;
  }
  .node.visible{opacity:1;transform:translateY(0)}

  .center{
    display:flex;
    flex-direction:column;
    align-items:center;
    padding-top:6px;
  }
  .center .stamp{
    width:20px;height:20px;
    border-radius:50%;
    background:var(--text-mute);
    z-index:2;
  }
  .center .stamp.current{
    background:var(--amber);
    box-shadow:0 0 22px var(--amber), 0 0 0 4px rgba(232,185,106,0.15);
  }
  .center .time{
    font-family:'JetBrains Mono',monospace;
    font-weight:700;
    font-size:17px;
    color:var(--text);
    margin-top:10px;
    text-align:center;
    white-space:nowrap;
  }
  .center .period{
    font-family:'JetBrains Mono',monospace;
    font-size:10px;
    color:var(--amber);
    margin-top:5px;
    letter-spacing:0.05em;
  }

  .side.left{display:flex;justify-content:flex-end}
  .side.right{display:flex;justify-content:flex-start}

  .connector{
    position:absolute;
    top:16px;
    height:1px;
    background:var(--line);
    width:24px;
  }
  .side.left .connector{right:-24px}
  .side.right .connector{left:-24px}

  .combo{
    position:relative;
    width:100%;
    max-width:340px;
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(18px);
    -webkit-backdrop-filter:blur(18px);
    border:1px solid rgba(255,255,255,0.1);
    border-radius:16px;
    padding:20px 22px;
    transition:transform 0.3s ease, border-color 0.3s ease;
  }
  .combo:hover{transform:translateY(-4px);border-color:rgba(255,255,255,0.22)}
  .combo-block + .combo-block{
    margin-top:16px;
    padding-top:16px;
    border-top:1px solid rgba(255,255,255,0.08);
  }
  .combo-block h3{
    font-family:'Noto Serif TC',serif;
    font-weight:600;
    font-size:15px;
    margin:10px 0 6px;
    cursor:pointer;
  }
  .combo-block.ext h3:hover{color:var(--ext)}
  .combo-block.int h3:hover{color:var(--int)}
  .combo-block p{font-size:13px;color:var(--text-soft)}
  .combo .read-more{
    display:inline-block;
    margin-top:8px;
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    text-decoration:none;
  }
  .combo-block.ext .read-more{color:var(--ext)}
  .combo-block.int .read-more{color:var(--int)}
  .combo.empty{
    background:rgba(255,255,255,0.02);
    border:1px dashed rgba(255,255,255,0.1);
    display:flex;align-items:center;justify-content:center;
    color:var(--text-mute);
    font-size:12px;
    font-family:'JetBrains Mono',monospace;
    min-height:80px;
  }

  .glass{
    position:relative;
    width:100%;
    max-width:340px;
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(18px);
    -webkit-backdrop-filter:blur(18px);
    border:1px solid rgba(255,255,255,0.1);
    border-radius:16px;
    padding:20px 22px;
    transition:transform 0.3s ease, border-color 0.3s ease;
  }
  .glass:hover{transform:translateY(-4px);border-color:rgba(255,255,255,0.22)}
  .glass.ext{box-shadow:0 8px 32px rgba(155,107,196,0.15)}
  .glass.int{box-shadow:0 8px 32px rgba(91,159,191,0.15)}
  .glass.empty{
    background:rgba(255,255,255,0.02);
    border:1px dashed rgba(255,255,255,0.1);
    display:flex;align-items:center;justify-content:center;
    color:var(--text-mute);
    font-size:12px;
    font-family:'JetBrains Mono',monospace;
    min-height:80px;
  }

  .tag{
    font-family:'JetBrains Mono',monospace;
    font-size:10px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    padding:3px 10px;
    border-radius:20px;
    display:inline-block;
    margin-bottom:12px;
  }
  .tag.ext{background:rgba(201,155,217,0.15);color:var(--ext)}
  .tag.int{background:rgba(143,196,217,0.15);color:var(--int)}

  .glass h3{
    font-family:'Noto Serif TC',serif;
    font-weight:600;
    font-size:16px;
    margin-bottom:8px;
    cursor:pointer;
  }
  .glass.ext h3:hover{color:var(--ext)}
  .glass.int h3:hover{color:var(--int)}
  .glass p{font-size:13px;color:var(--text-soft)}
  .read-more{
    display:inline-block;
    margin-top:10px;
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    text-decoration:none;
  }
  .glass.ext .read-more{color:var(--ext)}
  .glass.int .read-more{color:var(--int)}


  .actions{
    position:relative;
    width:100%;
    max-width:340px;
    background:rgba(232,185,106,0.07);
    backdrop-filter:blur(18px);
    -webkit-backdrop-filter:blur(18px);
    border:1px solid rgba(232,185,106,0.22);
    border-radius:16px;
    padding:20px 22px;
    box-shadow:0 8px 32px rgba(232,185,106,0.1);
  }
  .actions.empty{
    background:rgba(255,255,255,0.02);
    border:1px dashed rgba(255,255,255,0.1);
    display:flex;align-items:center;justify-content:center;
    color:var(--text-mute);
    font-size:12px;
    font-family:'JetBrains Mono',monospace;
    min-height:80px;
  }
  .actions-label{
    font-family:'JetBrains Mono',monospace;
    font-size:10px;
    color:var(--amber);
    letter-spacing:0.08em;
    text-transform:uppercase;
    margin-bottom:8px;
  }
  .action-item{
    display:flex;align-items:center;gap:10px;
    font-size:13px;color:var(--text-soft);
    padding:5px 0;
  }
  .action-item.done{color:var(--text-mute);text-decoration:line-through}
  .checkbox{
    width:16px;height:16px;border-radius:5px;
    border:1.5px solid var(--amber);
    flex-shrink:0;
    display:flex;align-items:center;justify-content:center;
  }
  .checkbox.checked{background:var(--amber);border-color:var(--amber)}
  .checkbox.checked::after{content:'✓';font-size:11px;color:#14121A;line-height:1}

  @media (max-width:760px){
    .node{grid-template-columns:1fr;gap:10px}
    .center{flex-direction:row;justify-content:flex-start;gap:10px;padding-top:0}
    .glass{max-width:none}
    .connector{display:none}
    .spine{left:6px}
    .center .stamp{margin-top:4px}
  }

  footer{
    position:relative;z-index:1;
    max-width:960px;margin:3rem auto 0;padding:2rem 24px 0;
    font-size:12px;color:var(--text-mute);
    font-family:'JetBrains Mono',monospace;
  }
</style>
</head>
<body>

<div class="bg-blob b1"></div>
<div class="bg-blob b2"></div>
<div class="bg-blob b3"></div>

<header>
  <div class="eyebrow">Personal Roadmap · Living Document</div>
  <h1>老脆的人生roadmap</h1>
  <p class="sub">持續更新的個人時間軸——左邊是每個時間點發生的事，區分外部事件與內在影響；右邊是對應的復盤行動清單。</p>
  <div class="legend">
    <span><i class="dot ext"></i>外部事件</span>
    <span><i class="dot int"></i>內在影響</span>
  </div>
</header>

<div class="timeline">
  <div class="spine"></div>
  <div id="nodes"></div>
</div>

<footer></footer>

<script>
const SHEET_ID = '1FC4GitJvxBG0dNQorjmMXvPk4iFa8rdIqZB7oUPMAUs';
const EVENTS_GID = '0';
const ACTIONS_GID = '387283646';

function csvUrl(gid){
  return `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${gid}`;
}
function parseCSV(text){
  const rows = [];
  let row = [], field = '', inQuotes = false;
  for(let i=0;i<text.length;i++){
    const c = text[i], next = text[i+1];
    if(inQuotes){
      if(c === '"' && next === '"'){ field+='"'; i++; }
      else if(c === '"'){ inQuotes = false; }
      else { field += c; }
    } else {
      if(c === '"'){ inQuotes = true; }
      else if(c === ','){ row.push(field); field=''; }
      else if(c === '\n' || c === '\r'){
        if(c==='\r' && next==='\n') i++;
        row.push(field); rows.push(row); row=[]; field='';
      } else { field += c; }
    }
  }
  if(field.length || row.length){ row.push(field); rows.push(row); }
  return rows.filter(r => r.some(v => v && v.trim().length));
}
function rowsToObjects(rows){
  const [header, ...data] = rows;
  return data.map(r => {
    const obj = {};
    header.forEach((h,i) => obj[h] = r[i] || '');
    return obj;
  });
}

function comboBlock(id, tag, title, content){
  if(!title) return '';
  return `
    <div class="combo-block ${tag}">
      <span class="tag ${tag}">${tag === 'ext' ? '外部事件' : '內在影響'}</span>
      <h3 onclick="location.href='post.html?id=${encodeURIComponent(id)}'">${title}</h3>
      <p>${content}</p>
      <a class="read-more" href="post.html?id=${encodeURIComponent(id)}">閱讀全文 →</a>
    </div>
  `;
}

function comboHTML(ev){
  const id = (ev.ID || '').trim();
  const blocks = comboBlock(`${id}-ext`, 'ext', ev.Ext_Title, ev.Ext_Content)
    + comboBlock(`${id}-int`, 'int', ev.Int_Title, ev.Int_Content);
  if(!blocks) return `<div class="combo empty">尚無紀錄</div>`;
  return `<div class="combo">${blocks}</div>`;
}

function actionsHTML(eventId, actionsById){
  const list = actionsById[eventId];
  if(!list || !list.length){
    return `<div class="actions empty">尚無行動清單</div>`;
  }
  return `
    <div class="actions">
      <div class="actions-label">復盤後行動清單</div>
      ${list.map(a => {
        const done = (a.Done || '').trim().toUpperCase() === 'TRUE';
        return `<div class="action-item ${done ? 'done' : ''}">
          <span class="checkbox ${done ? 'checked' : ''}"></span>
          <span>${a.Action}</span>
        </div>`;
      }).join('')}
    </div>
  `;
}

Promise.all([
  fetch(csvUrl(EVENTS_GID)).then(r => r.text()),
  fetch(csvUrl(ACTIONS_GID)).then(r => r.text())
]).then(([eventsText, actionsText]) => {
  const events = rowsToObjects(parseCSV(eventsText));
  const actions = rowsToObjects(parseCSV(actionsText));

  const actionsById = {};
  actions.forEach(a => {
    const id = (a.EventID || '').trim();
    if(!id) return;
    if(!actionsById[id]) actionsById[id] = [];
    actionsById[id].push(a);
  });

  const nodes = document.getElementById('nodes');
  const lastIndex = events.length - 1;
  nodes.innerHTML = events.map((ev, i) => {
    const id = (ev.ID || '').trim();
    const isCurrent = i === lastIndex;
    return `
      <div class="node">
        <div class="side left">
          <div class="connector"></div>
          ${comboHTML(ev)}
        </div>
        <div class="center">
          <div class="stamp ${isCurrent ? 'current' : ''}"></div>
          <div class="time">${ev.Time || ''}</div>
          <div class="period">${ev.Period || ''}</div>
        </div>
        <div class="side right">
          <div class="connector"></div>
          ${actionsHTML(id, actionsById)}
        </div>
      </div>
    `;
  }).join('');

  const observer = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if(e.isIntersecting){
        e.target.classList.add('visible');
        observer.unobserve(e.target);
      }
    });
  }, { threshold: 0.15 });
  document.querySelectorAll('.node').forEach(n => observer.observe(n));
}).catch(err => {
  document.getElementById('nodes').innerHTML =
    `<p style="color:var(--text-mute);font-family:'JetBrains Mono',monospace;font-size:13px">讀取失敗：${err.message}</p>`;
});
</script>

</body>
</html>
