<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>老脆的人生roadmap</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+TC:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#1E1719;
    --bg-raise:#2A2224;
    --card:#26202200 ;
    --card-bg:#2A2224;
    --text:#EDE7E8;
    --text-soft:#B9AEB2;
    --text-mute:#7C7176;
    --purple:#C79BB0;
    --purple-deep:#976189;
    --purple-bg:#3A2A34;
    --purple-int:#D9B8CB;
    --purple-int-bg:#453040;
    --green:#A9C97A;
    --line:#3A3235;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:'Noto Sans TC',sans-serif;
    line-height:1.7;
    padding:0 0 6rem;
  }
  header{
    max-width:920px;
    margin:0 auto;
    padding:4.5rem 24px 3rem;
    border-bottom:1px solid var(--line);
  }
  .eyebrow{
    font-family:'JetBrains Mono',monospace;
    font-size:12px;
    letter-spacing:0.14em;
    color:var(--purple);
    text-transform:uppercase;
    margin-bottom:1rem;
  }
  h1{
    font-family:'Noto Serif TC',serif;
    font-weight:700;
    font-size:clamp(28px,5vw,44px);
    line-height:1.35;
    color:var(--text);
  }
  .sub{
    margin-top:1rem;
    color:var(--text-soft);
    font-size:15px;
    max-width:56ch;
  }
  .legend{
    display:flex;
    gap:20px;
    margin-top:2rem;
    font-size:13px;
    color:var(--text-mute);
  }
  .legend span{display:inline-flex;align-items:center;gap:6px}
  .dot{width:9px;height:9px;border-radius:50%;display:inline-block}
  .dot.ext{background:var(--purple-deep)}
  .dot.int{background:var(--purple-int)}

  main{max-width:920px;margin:0 auto;padding:0 24px}
  #status{
    font-family:'JetBrains Mono',monospace;
    font-size:13px;
    color:var(--text-mute);
    padding:3rem 0;
  }

  .row{
    display:grid;
    grid-template-columns:88px 1fr;
    gap:0 20px;
    position:relative;
    padding-bottom:2.5rem;
  }
  .row::before{
    content:'';
    position:absolute;
    left:92px;
    top:6px;
    bottom:-2.5rem;
    width:1px;
    background:var(--line);
  }
  .row:last-child::before{display:none}
  .rail{position:relative}
  .time{
    font-family:'JetBrains Mono',monospace;
    font-size:12px;
    color:var(--text-mute);
    padding-top:4px;
  }
  .period{
    font-family:'JetBrains Mono',monospace;
    font-size:10px;
    color:var(--purple);
    margin-top:4px;
    letter-spacing:0.04em;
  }
  .stamp{
    position:absolute;
    left:88px;
    top:2px;
    transform:translateX(-50%);
    width:11px;
    height:11px;
    border-radius:50%;
    background:var(--purple-deep);
    border:2px solid var(--bg);
    z-index:1;
  }

  .cols{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:16px;
  }
  .col{
    background:var(--card-bg);
    border:1px solid var(--line);
    border-radius:10px;
    padding:18px 20px;
  }
  .col.empty{
    background:transparent;
    border:1px dashed var(--line);
    display:flex;
    align-items:center;
    justify-content:center;
    color:var(--text-mute);
    font-size:12px;
    font-family:'JetBrains Mono',monospace;
  }
  .col-tag{
    font-family:'JetBrains Mono',monospace;
    font-size:10px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    padding:2px 8px;
    border-radius:20px;
    display:inline-block;
    margin-bottom:10px;
  }
  .col-tag.ext{background:var(--purple-bg);color:var(--purple)}
  .col-tag.int{background:var(--purple-int-bg);color:var(--purple-int)}

  .col h3{
    font-family:'Noto Serif TC',serif;
    font-weight:600;
    font-size:16px;
    margin-bottom:8px;
    color:var(--text);
    cursor:pointer;
  }
  .col h3:hover{color:var(--purple-int)}
  .col p{
    font-size:13.5px;
    color:var(--text-soft);
  }
  .read-more{
    display:inline-block;
    margin-top:10px;
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    color:var(--purple);
    text-decoration:none;
    border-bottom:1px solid transparent;
  }
  .read-more:hover{border-bottom-color:var(--purple)}

  .actions{
    margin-top:1rem;
    background:var(--bg-raise);
    border:1px solid var(--line);
    border-radius:10px;
    padding:14px 18px;
  }
  .actions-label{
    font-family:'JetBrains Mono',monospace;
    font-size:10px;
    color:var(--text-mute);
    letter-spacing:0.08em;
    text-transform:uppercase;
    margin-bottom:8px;
  }
  .action-item{
    display:flex;
    align-items:center;
    gap:10px;
    font-size:13px;
    color:var(--text-soft);
    padding:5px 0;
  }
  .action-item.done{color:var(--text-mute);text-decoration:line-through}
  .checkbox{
    width:16px;height:16px;
    border-radius:4px;
    border:1.5px solid var(--purple);
    flex-shrink:0;
    display:flex;align-items:center;justify-content:center;
  }
  .checkbox.checked{background:var(--green);border-color:var(--green)}
  .checkbox.checked::after{content:'✓';font-size:11px;color:#1E1719;line-height:1}

  @media (max-width:640px){
    .cols{grid-template-columns:1fr}
    .row{grid-template-columns:64px 1fr;gap:0 12px}
    .row::before{left:68px}
    .stamp{left:64px}
  }

  footer{
    max-width:920px;
    margin:3rem auto 0;
    padding:2rem 24px 0;
    border-top:1px solid var(--line);
    font-size:12px;
    color:var(--text-mute);
    font-family:'JetBrains Mono',monospace;
  }
</style>
</head>
<body>

<header>
  <div class="eyebrow">Personal Roadmap · Living Document</div>
  <h1>老脆的人生roadmap</h1>
  <p class="sub">持續更新的個人時間軸——左邊是外部發生的事件，右邊是同一時間點的內在轉折，兩者不一定同時存在。</p>
  <div class="legend">
    <span><i class="dot ext"></i>外部事件</span>
    <span><i class="dot int"></i>內在影響</span>
  </div>
</header>

<main>
  <div id="status">讀取資料中...</div>
  <div id="timeline"></div>
</main>

<footer>
  資料來源：Google Sheets，即時同步。
</footer>

<script>
const SHEET_ID = '1FC4GitJvxBG0dNQorjmMXvPk4iFa8rdIqZB7oUPMAUs';
const EVENTS_GID = '0';
const ACTIONS_GID = '387283646';

function csvUrl(gid){
  return `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${gid}`;
}

function parseCSV(text){
  const rows = [];
  let row = [], field = '', inQuotes = false;
  for(let i=0;i<text.length;i++){
    const c = text[i], next = text[i+1];
    if(inQuotes){
      if(c === '"' && next === '"'){ field+='"'; i++; }
      else if(c === '"'){ inQuotes = false; }
      else { field += c; }
    } else {
      if(c === '"'){ inQuotes = true; }
      else if(c === ','){ row.push(field); field=''; }
      else if(c === '\n' || c === '\r'){
        if(c==='\r' && next==='\n') i++;
        row.push(field); rows.push(row); row=[]; field='';
      } else { field += c; }
    }
  }
  if(field.length || row.length){ row.push(field); rows.push(row); }
  return rows.filter(r => r.some(v => v && v.trim().length));
}

function rowsToObjects(rows){
  const [header, ...data] = rows;
  return data.map(r => {
    const obj = {};
    header.forEach((h,i) => obj[h] = r[i] || '');
    return obj;
  });
}

function colHTML(id, tag, title, content, hasContent){
  if(!title && !content){
    return `<div class="col empty">尚無紀錄</div>`;
  }
  const linkAttrs = hasContent ? `onclick="location.href='post.html?id=${encodeURIComponent(id)}'"` : '';
  return `
    <div class="col">
      <span class="col-tag ${tag}">${tag === 'ext' ? '外部事件' : '內在影響'}</span>
      <h3 ${linkAttrs}>${title}</h3>
      <p>${content}</p>
      ${hasContent ? `<a class="read-more" href="post.html?id=${encodeURIComponent(id)}">閱讀全文 →</a>` : ''}
    </div>
  `;
}

function actionsHTML(eventId, actionsById){
  const list = actionsById[eventId];
  if(!list || !list.length) return '';
  return `
    <div class="actions">
      <div class="actions-label">行動清單</div>
      ${list.map(a => {
        const done = (a.Done || '').trim().toUpperCase() === 'TRUE';
        return `<div class="action-item ${done ? 'done' : ''}">
          <span class="checkbox ${done ? 'checked' : ''}"></span>
          <span>${a.Action}</span>
        </div>`;
      }).join('')}
    </div>
  `;
}

Promise.all([
  fetch(csvUrl(EVENTS_GID)).then(r => r.text()),
  fetch(csvUrl(ACTIONS_GID)).then(r => r.text())
]).then(([eventsText, actionsText]) => {
  const events = rowsToObjects(parseCSV(eventsText));
  const actions = rowsToObjects(parseCSV(actionsText));

  const actionsById = {};
  actions.forEach(a => {
    const id = (a.EventID || '').trim();
    if(!id) return;
    if(!actionsById[id]) actionsById[id] = [];
    actionsById[id].push(a);
  });

  const status = document.getElementById('status');
  const timeline = document.getElementById('timeline');

  if(!events.length){
    status.textContent = '目前表格裡還沒有資料。';
    return;
  }
  status.style.display = 'none';

  timeline.innerHTML = events.map(ev => {
    const id = (ev.ID || '').trim();
    const extId = `${id}-ext`;
    const intId = `${id}-int`;
    return `
      <div class="row">
        <div class="rail">
          <div class="time">${ev.Time || ''}</div>
          <div class="period">${ev.Period || ''}</div>
          <div class="stamp"></div>
        </div>
        <div>
          <div class="cols">
            ${colHTML(extId, 'ext', ev.Ext_Title, ev.Ext_Content, !!ev.Ext_Title)}
            ${colHTML(intId, 'int', ev.Int_Title, ev.Int_Content, !!ev.Int_Title)}
          </div>
          ${actionsHTML(id, actionsById)}
        </div>
      </div>
    `;
  }).join('');
}).catch(err => {
  document.getElementById('status').innerHTML =
    '讀取失敗：' + err.message +
    '<br>請確認 Google Sheets 的共用設定為「知道連結的使用者均可查看」。';
});
</script>

</body>
</html>
